name: Build AU Plugin (macOS)

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.1.0
        with:
          submodules: recursive        # ← inizializza tutti i submodule

      - name: Build Audio Unit with Xcode
        run: |
          cd Source/dissonanceMeeter/Builds/MacOSX
          xcodebuild -project dissonanceMeeter.xcodeproj -configuration Release -arch x86_64

      - name: Upload AU component
        uses: actions/upload-artifact@v4.3.0
        with:
          name: AU-Build
          path: Builds/MacOSX/build/Release/*.component
